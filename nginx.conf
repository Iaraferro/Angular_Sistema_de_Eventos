server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Suporte ao HTML5 History API (Angular Router)
    # Todas as rotas desconhecidas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash (gerados pelo Angular)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para index.html (sempre busca a versão mais recente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
