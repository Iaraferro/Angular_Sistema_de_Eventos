<!-- src/app/features/admin/admin.component.html -->
<div class="admin-wrapper">
  <!-- Mobile overlay backdrop -->
  <div class="sidebar-backdrop" [class.active]="sidebarOpen" (click)="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <a routerLink="/admin/dashboard" class="sidebar-logo" (click)="sidebarOpen = false">
        <i class="bi bi-tree-fill"></i>
        <span>EcoEventos</span>
      </a>
    </div>

    <div class="sidebar-user" *ngIf="authService.getCurrentUser()">
      <div class="user-avatar">
        <i class="bi bi-person-fill"></i>
      </div>
      <div class="user-info">
        <div class="user-name">{{ authService.getCurrentUser()?.username }}</div>
        <div class="user-role">{{ authService.getCurrentUser()?.perfil?.nome }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active" (click)="sidebarOpen = false">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/eventos" routerLinkActive="active" (click)="sidebarOpen = false">
          <i class="bi bi-calendar-event"></i>
          <span>Eventos</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/novo-evento" routerLinkActive="active" (click)="sidebarOpen = false">
          <i class="bi bi-plus-circle"></i>
          <span>Novo Evento</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/participantes" routerLinkActive="active" (click)="sidebarOpen = false">
          <i class="bi bi-people"></i>
          <span>Participantes</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/relatorios" routerLinkActive="active" (click)="sidebarOpen = false">
          <i class="bi bi-graph-up"></i>
          <span>Relatórios</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/usuarios" routerLinkActive="active" (click)="sidebarOpen = false">
          <i class="bi bi-person-badge"></i>
          <span>Usuários</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="logout-btn" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sair</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <button class="sidebar-toggle-inline" (click)="toggleSidebar()" aria-label="Menu">
        <i class="bi bi-list"></i>
      </button>
      <h1 class="page-title">{{ currentTitle }}</h1>
      <div class="top-bar-actions">
        <a routerLink="/" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-globe"></i> <span class="d-none d-sm-inline">Ver Site</span>
        </a>
      </div>
    </div>
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Mobile Toggle FAB -->
  <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Menu">
    <i [class]="sidebarOpen ? 'bi bi-x-lg' : 'bi bi-list'"></i>
  </button>
</div>
