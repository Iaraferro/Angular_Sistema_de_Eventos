<!-- src/app/features/admin/admin.component.html -->
<div class="admin-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <a routerLink="/admin/dashboard" class="sidebar-logo">
        <i class="bi bi-tree-fill"></i>
        <span>EcoEventos</span>
      </a>
    </div>

    <div class="sidebar-user" *ngIf="authService.getCurrentUser()">
      <div class="user-avatar">
        <i class="bi bi-person-fill"></i>
      </div>
      <div class="user-info">
        <div class="user-name">{{ authService.getCurrentUser()?.username }}</div>
        <div class="user-role">{{ authService.getCurrentUser()?.perfil?.nome }}</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/eventos" routerLinkActive="active">
          <i class="bi bi-calendar-event"></i>
          <span>Eventos</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/novo-evento" routerLinkActive="active">
          <i class="bi bi-plus-circle"></i>
          <span>Novo Evento</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/inscricoes" routerLinkActive="active">
          <i class="bi bi-person-vcard"></i>
          <span>Inscrições</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/relatorios" routerLinkActive="active">
          <i class="bi bi-graph-up"></i>
          <span>Relatórios</span>
        </a>
      </div>
      <div class="nav-item">
        <a class="nav-link" routerLink="/admin/usuarios" routerLinkActive="active">
          <i class="bi bi-person-badge"></i>
          <span>Usuários</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="logout-btn" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        <span>Sair</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="top-bar">
      <h1 class="page-title">{{ currentTitle }}</h1>
      <div class="top-bar-actions">
        <a routerLink="/" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-globe"></i> Ver Site
        </a>
      </div>
    </div>
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>

  <app-toast></app-toast>

  <!-- Mobile Toggle -->
  <button class="sidebar-toggle" (click)="toggleSidebar()">
    <i [class]="sidebarOpen ? 'bi bi-x-lg' : 'bi bi-list'"></i>
  </button>
</div>
