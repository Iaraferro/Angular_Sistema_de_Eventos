<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">
          <i class="bi bi-tree-fill"></i>
        </div>
        <h2>EcoEventos Palmas</h2>
        <p class="text-muted">Acesse o painel administrativo</p>
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm">
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-person"></i> Usuário
          </label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="username"
            name="username"
            placeholder="Digite seu usuário"
            required
            autocomplete="username">
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="bi bi-lock"></i> Senha
            </label>
            <div class="password-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                class="form-control"
                [(ngModel)]="senha"
                name="senha"
                placeholder="Digite sua senha"
                required
                autocomplete="current-password">
                <button
                  type="button"
                  class="password-toggle"
                  (click)="togglePassword()">
                  <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="btn-login"
              [disabled]="loading || !username || !senha">
              @if (loading) {
                <span class="spinner-border spinner-border-sm me-2"></span>
              }
              {{ loading ? 'Entrando...' : 'Entrar no Sistema' }}
            </button>

            @if (errorMessage) {
              <div class="alert-error">
                <i class="bi bi-exclamation-triangle-fill"></i>
                {{ errorMessage }}
              </div>
            }
          </form>

          <div class="login-footer">
            <a routerLink="/" class="back-link">
              <i class="bi bi-arrow-left"></i> Voltar para o site
            </a>
          </div>
        </div>

        <!-- Info card -->
        <div class="login-info">
          <div class="info-card">
            <i class="bi bi-shield-lock"></i>
            <h5>Acesso Restrito</h5>
            <p>Esta área é exclusiva para administradores do sistema EcoEventos.</p>
          </div>
          <div class="info-card">
            <i class="bi bi-calendar-event"></i>
            <h5>Gerencie Eventos</h5>
            <p>Crie, edite e organize eventos ambientais da sua cidade.</p>
          </div>
        </div>
      </div>
    </div>
