<!-- src/app/shared/components/menu/menu.component.html -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">
      <i class="bi bi-tree-fill me-2"></i>EcoEventos Palmas
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" >
            Início
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/" fragment="eventos" >
            Eventos
          </a>
        </li>
        @if (authService.isAdmin()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">
              <i class="bi bi-shield-lock me-1"></i>Admin
            </a>
          </li>
        }
        @if (!authService.isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </a>
          </li>
        }
        @if (authService.isLoggedIn()) {
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="$event.preventDefault(); logout()">
              <i class="bi bi-box-arrow-right me-1"></i>Sair
            </a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
